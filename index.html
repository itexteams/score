<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAnalytics - Phân tích điểm thi & Xét Tốt Nghiệp</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = window.React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer } = window.Recharts;

        // --- ICON COMPONENTS ---
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>;
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>;
        const IconUsers = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const IconSearch = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconGraduation = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>;

        const SUBJECTS = ['Toán', 'Văn', 'Anh', 'Lý', 'Hóa', 'Sinh', 'Sử', 'Địa', 'KTPL', 'Tin', 'CN (NN)', 'CN (CN)', 'TO', 'VA', 'LI', 'HO', 'SI', 'SU', 'DI'];

        // --- SHARED COMPONENTS ---
        const NavItem = ({ icon, label, active, onClick, disabled }) => (
          <button onClick={onClick} disabled={disabled} className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors ${ disabled ? 'opacity-50 cursor-not-allowed text-gray-400' : active ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-100' }`}>
            {icon}<span>{label}</span>
          </button>
        );

        const StatCard = ({ title, value, subtitle, colorClass = "text-blue-600" }) => (
          <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
            <h3 className="text-gray-500 text-sm font-medium mb-1">{title}</h3>
            <div className={`text-3xl font-bold ${colorClass}`}>{value}</div>
            {subtitle && <p className="text-gray-400 text-xs mt-2">{subtitle}</p>}
          </div>
        );

        // ==========================================
        // 1. DASHBOARD VIEW 
        // ==========================================
        const DashboardView = ({ data }) => {
          const stats = useMemo(() => {
            let totalStudents = data.length;
            let classes = new Set(data.map(d => d.Class || d['Lớp']).filter(c => c)).size;
            
            const subjectAverages = SUBJECTS.map(sub => {
              const validScores = data.filter(d => d[sub] !== null && d[sub] !== undefined && d[sub] !== '').map(d => Number(d[sub]));
              const avg = validScores.length > 0 ? (validScores.reduce((a, b) => a + b, 0) / validScores.length).toFixed(2) : 0;
              return { subject: sub, avg: parseFloat(avg), count: validScores.length };
            }).filter(s => s.count > 0);

            const classGroups = {};
            data.forEach(d => {
                const className = d.Class || d['Lớp'];
                if (!className) return;
                
                if (!classGroups[className]) {
                    classGroups[className] = { totalScore: 0, count: 0 };
                }
                
                SUBJECTS.forEach(sub => {
                    if (d[sub] !== null && d[sub] !== undefined && d[sub] !== '') {
                        classGroups[className].totalScore += Number(d[sub]);
                        classGroups[className].count += 1;
                    }
                });
            });

            const classAverages = Object.keys(classGroups).map(c => ({
                className: c,
                avg: classGroups[c].count > 0 ? parseFloat((classGroups[c].totalScore / classGroups[c].count).toFixed(2)) : 0
            })).sort((a, b) => a.className.localeCompare(b.className));

            return { totalStudents, classes, subjectAverages, classAverages };
          }, [data]);

          return (
            <div className="space-y-6">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                <StatCard title="Tổng số học sinh" value={stats.totalStudents} subtitle="Dữ liệu đã được nạp tự động" colorClass="text-blue-600" />
                <StatCard title="Số lượng lớp" value={stats.classes} subtitle="Tham gia trong kỳ thi" colorClass="text-purple-600" />
                <StatCard title="Môn có ĐTB cao nhất" value={stats.subjectAverages.length > 0 ? [...stats.subjectAverages].sort((a,b)=>b.avg - a.avg)[0].subject : 'N/A'} subtitle={stats.subjectAverages.length > 0 ? `ĐTB: ${[...stats.subjectAverages].sort((a,b)=>b.avg - a.avg)[0].avg}` : ''} colorClass="text-emerald-600" />
              </div>
              
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col justify-between">
                  <h3 className="text-base font-semibold mb-6 text-gray-800">Điểm trung bình theo môn học</h3>
                  <div className="h-80 w-full">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={stats.subjectAverages} margin={{ top: 10, right: 10, left: -20, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                        <XAxis dataKey="subject" axisLine={false} tickLine={false} style={{fontSize: '11px'}} />
                        <YAxis domain={[0, 10]} axisLine={false} tickLine={false} />
                        <RechartsTooltip cursor={{fill: '#F3F4F6'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                        <Bar dataKey="avg" name="Điểm TB" fill="#3B82F6" radius={[4, 4, 0, 0]} barSize={25} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>

                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 flex flex-col justify-between">
                  <h3 className="text-base font-semibold mb-6 text-gray-800">Điểm trung bình theo lớp (Tất cả môn)</h3>
                  <div className="h-80 w-full">
                    {stats.classAverages.length > 0 ? (
                      <ResponsiveContainer width="100%" height="100%">
                        <BarChart data={stats.classAverages} margin={{ top: 10, right: 10, left: -20, bottom: 5 }}>
                          <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                          <XAxis dataKey="className" axisLine={false} tickLine={false} style={{fontSize: '11px'}} />
                          <YAxis domain={[0, 10]} axisLine={false} tickLine={false} />
                          <RechartsTooltip cursor={{fill: '#F3F4F6'}} contentStyle={{borderRadius: '8px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)'}} />
                          <Bar dataKey="avg" name="Điểm TB Lớp" fill="#10B981" radius={[4, 4, 0, 0]} barSize={25} />
                        </BarChart>
                      </ResponsiveContainer>
                    ) : (
                      <div className="h-full flex items-center justify-center text-gray-400 text-sm">Không tìm thấy dữ liệu lớp học</div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // 2, 3, 4: GỘP CHUNG (SUBJECT, CLASS, SEARCH)
        // ==========================================
        const SubjectAnalysisView = ({ data }) => {
          const validSubjects = SUBJECTS.filter(sub => data.some(d => d[sub] != null && d[sub] !== ''));
          const [selectedSubject, setSelectedSubject] = useState(validSubjects[0] || SUBJECTS[0]);

          const subjectData = useMemo(() => {
            const validData = data.filter(d => d[selectedSubject] != null && d[selectedSubject] !== '');
            const scores = validData.map(d => Number(d[selectedSubject]));
            if (scores.length === 0) return null;

            const max = Math.max(...scores);
            const min = Math.min(...scores);
            const avg = (scores.reduce((a, b) => a + b, 0) / scores.length).toFixed(2);
            const distribution = Array(10).fill(0).map((_, i) => ({ range: `${i} - ${i+1}`, count: 0 }));
            scores.forEach(score => {
              let index = Math.floor(score);
              if (index === 10) index = 9; 
              distribution[index].count++;
            });
            const topStudents = [...validData].sort((a, b) => Number(b[selectedSubject]) - Number(a[selectedSubject])).slice(0, 10);
            return { max, min, avg, count: scores.length, distribution, topStudents };
          }, [data, selectedSubject]);

          return (
            <div className="space-y-6">
              <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100 flex flex-wrap items-center justify-between gap-4">
                <label className="font-medium text-gray-700 flex items-center gap-3">
                  Chọn môn học:
                  <select value={selectedSubject} onChange={(e) => setSelectedSubject(e.target.value)} className="border-gray-300 rounded-md shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 py-2 px-4 outline-none border bg-white">
                    {validSubjects.map(sub => <option key={sub} value={sub}>{sub}</option>)}
                  </select>
                </label>
                {subjectData && <span className="text-sm px-4 py-2 bg-blue-50 text-blue-700 rounded-lg font-medium">Số bài thi: {subjectData.count}</span>}
              </div>

              {!subjectData ? (
                <div className="text-center text-gray-500 py-10 bg-white rounded-xl">Không có dữ liệu cho môn học này.</div>
              ) : (
                <>
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <StatCard title="Điểm Trung Bình" value={subjectData.avg} colorClass="text-blue-600" />
                    <StatCard title="Điểm Cao Nhất" value={subjectData.max} colorClass="text-green-600" />
                    <StatCard title="Điểm Thấp Nhất" value={subjectData.min} colorClass="text-red-600" />
                  </div>
                  <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                      <h3 className="text-lg font-semibold mb-6">Phổ điểm môn {selectedSubject}</h3>
                      <div className="h-72">
                        <ResponsiveContainer width="100%" height="100%">
                          <BarChart data={subjectData.distribution} margin={{ top: 20, right: 30, left: -20, bottom: 5 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#E5E7EB" />
                            <XAxis dataKey="range" axisLine={false} tickLine={false} style={{fontSize: '12px'}} />
                            <YAxis axisLine={false} tickLine={false} />
                            <RechartsTooltip cursor={{fill: '#F3F4F6'}} />
                            <Bar dataKey="count" name="Số học sinh" fill="#8B5CF6" radius={[4, 4, 0, 0]} />
                          </BarChart>
                        </ResponsiveContainer>
                      </div>
                    </div>
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
                      <div className="p-4 border-b border-gray-100 bg-gray-50/50">
                        <h3 className="font-semibold text-gray-800">Top 10 điểm cao nhất</h3>
                      </div>
                      <div className="flex-1 overflow-auto">
                        <table className="w-full text-sm text-left text-gray-500">
                          <thead className="text-xs text-gray-700 uppercase bg-gray-50 sticky top-0">
                            <tr>
                              <th className="px-4 py-3">STT</th>
                              <th className="px-4 py-3">SBD / Họ tên</th>
                              <th className="px-4 py-3 text-right">Điểm</th>
                            </tr>
                          </thead>
                          <tbody>
                            {subjectData.topStudents.map((st, idx) => (
                              <tr key={idx} className="bg-white border-b hover:bg-gray-50">
                                <td className="px-4 py-2 font-medium">{idx + 1}</td>
                                <td className="px-4 py-2">
                                  <div className="font-medium text-gray-900">{st['Họ tên'] || st['Họ và tên'] || st['Tên']}</div>
                                  <div className="text-xs text-gray-500">SBD: {st['SBD']}</div>
                                </td>
                                <td className="px-4 py-2 text-right font-bold text-blue-600">{st[selectedSubject]}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  </div>
                </>
              )}
            </div>
          );
        };

        const ClassAnalysisView = ({ data }) => {
          const classes = useMemo(() => [...new Set(data.map(d => d.Class || d['Lớp']).filter(c => c))], [data]);
          const [selectedClass, setSelectedClass] = useState(classes[0] || '');

          const classData = useMemo(() => {
            if (!selectedClass) return null;
            const studentsInClass = data.filter(d => (d.Class || d['Lớp']) === selectedClass);
            
            const subjectStats = SUBJECTS.map(sub => {
              const scores = studentsInClass.filter(d => d[sub] != null && d[sub] !== '').map(d => Number(d[sub]));
              if(scores.length === 0) return null;
              return {
                subject: sub,
                avg: (scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(2),
                max: Math.max(...scores)
              };
            }).filter(s => s != null);

            return { totalStudents: studentsInClass.length, subjectStats, students: studentsInClass };
          }, [data, selectedClass]);

          return (
            <div className="space-y-6">
               <div className="bg-white rounded-xl shadow-sm p-4 border border-gray-100 flex flex-wrap items-center gap-4">
                <label className="font-medium text-gray-700 flex items-center gap-3">
                  Chọn Lớp:
                  <select value={selectedClass} onChange={e => setSelectedClass(e.target.value)} className="border-gray-300 rounded-md py-2 px-4 outline-none border bg-white focus:ring-2 focus:ring-blue-500">
                    {classes.map(c => <option key={c} value={c}>{c}</option>)}
                  </select>
                </label>
                {classData && <span className="px-4 py-2 bg-purple-50 text-purple-700 rounded-lg font-medium text-sm">Sĩ số: {classData.totalStudents}</span>}
              </div>

              {classData && (
                <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                  <h3 className="text-lg font-semibold mb-6">Điểm trung bình các môn của lớp {selectedClass}</h3>
                  <div className="h-80">
                    <ResponsiveContainer width="100%" height="100%">
                      <BarChart data={classData.subjectStats} margin={{ top: 20, right: 30, left: 0, bottom: 5 }}>
                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                        <XAxis dataKey="subject" axisLine={false} tickLine={false} />
                        <YAxis domain={[0, 10]} axisLine={false} tickLine={false} />
                        <RechartsTooltip cursor={{fill: '#F3F4F6'}} />
                        <Bar dataKey="avg" name="Điểm TB Lớp" fill="#8B5CF6" radius={[4, 4, 0, 0]} barSize={40} />
                      </BarChart>
                    </ResponsiveContainer>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const SearchView = ({ data }) => {
          const [term, setTerm] = useState('');
          const results = useMemo(() => {
            if(!term.trim()) return [];
            const lower = term.toLowerCase();
            return data.filter(d => 
              String(d['SBD'] || '').toLowerCase().includes(lower) || 
              String(d['Họ tên'] || d['Họ và tên'] || d['Tên'] || '').toLowerCase().includes(lower)
            ).slice(0, 10);
          }, [term, data]);

          return (
            <div className="space-y-6">
              <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                 <div className="relative">
                    <IconSearch className="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400" />
                    <input type="text" value={term} onChange={e => setTerm(e.target.value)} placeholder="Nhập SBD hoặc Họ tên để tra cứu điểm thi..." className="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                 </div>
              </div>
              {results.length > 0 && (
                 <div className="space-y-4">
                    {results.map((student, i) => (
                       <div key={i} className="bg-white rounded-xl shadow-sm p-6 border border-gray-100">
                          <div className="flex gap-4 items-center mb-4 pb-4 border-b border-gray-100">
                             <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-bold text-xl">{String(student['Họ tên'] || student['Tên'] || 'A').charAt(0)}</div>
                             <div>
                                <h3 className="font-bold text-lg text-gray-800">{student['Họ tên'] || student['Họ và tên'] || student['Tên']}</h3>
                                <p className="text-gray-500 text-sm">SBD: {student['SBD'] || student['Số báo danh']} | Lớp: {student['Lớp'] || student['Class'] || 'N/A'}</p>
                             </div>
                          </div>
                          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                             {SUBJECTS.map(sub => (
                                student[sub] != null && student[sub] !== '' ? (
                                   <div key={sub} className="bg-gray-50 p-3 rounded-lg border border-gray-100 text-center">
                                      <div className="text-xs text-gray-500 mb-1 font-semibold">{sub}</div>
                                      <div className="font-bold text-lg text-blue-700">{student[sub]}</div>
                                   </div>
                                ) : null
                             ))}
                          </div>
                       </div>
                    ))}
                 </div>
              )}
            </div>
          );
        };

        // ==========================================
        // 5. TÍNH ĐIỂM TỐT NGHIỆP VIEW
        // ==========================================
        const GraduationView = ({ data }) => {
          const [searchTerm, setSearchTerm] = useState('');
          const [showDropdown, setShowDropdown] = useState(false);
          const [searchResults, setSearchResults] = useState([]);
          
          const [selectedStudent, setSelectedStudent] = useState(null);
          const [examScores, setExamScores] = useState(['', '', '', '']);
          const [year10, setYear10] = useState('');
          const [year11, setYear11] = useState('');
          const [year12, setYear12] = useState('');
          const [bonusKK, setBonusKK] = useState('0');
          const [bonusUT, setBonusUT] = useState('0');
          const [result, setResult] = useState(null);

          useEffect(() => {
            if (!searchTerm.trim()) { setSearchResults([]); return; }
            const lower = searchTerm.toLowerCase();
            const res = data.filter(d => String(d['SBD'] || '').toLowerCase().includes(lower) || String(d['Họ tên'] || d['Họ và tên'] || d['Tên'] || '').toLowerCase().includes(lower)).slice(0, 8); 
            setSearchResults(res);
          }, [searchTerm, data]);

          const handleSelect = (student) => {
            setSelectedStudent(student);
            setSearchTerm(`${student['SBD'] || ''} - ${student['Họ tên'] || student['Họ và tên'] || student['Tên'] || ''}`);
            setShowDropdown(false);
            const scores = [];
            SUBJECTS.forEach(sub => {
              if (student[sub] != null && student[sub] !== '') scores.push(Number(student[sub]));
            });
            const newExams = ['', '', '', ''];
            for (let i = 0; i < 4 && i < scores.length; i++) newExams[i] = scores[i];
            setExamScores(newExams);
            setResult(null);
          };

          const calculate = () => {
            const s1 = parseFloat(examScores[0]); const s2 = parseFloat(examScores[1]);
            const s3 = parseFloat(examScores[2]); const s4 = parseFloat(examScores[3]);
            const y10 = parseFloat(year10); const y11 = parseFloat(year11); const y12 = parseFloat(year12);
            const kk = parseFloat(bonusKK) || 0; const ut = parseFloat(bonusUT) || 0;

            if ([s1, s2, s3, s4].some(isNaN)) { alert('Vui lòng đảm bảo đã nhập đủ 4 môn thi!'); return; }
            if ([y10, y11, y12].some(isNaN)) { alert('Vui lòng nhập điểm học bạ cả 3 năm!'); return; }

            const hasLiet = [s1, s2, s3, s4].some(s => s <= 1.0);
            const tbThi = (s1 + s2 + s3 + s4) / 4;
            const tbHocBa = (y10 + y11 + y12) / 3;
            const dxtn = (tbThi + tbHocBa) / 2 + kk + ut;
            const isPass = !hasLiet && dxtn >= 5.0;

            setResult({ dxtn: dxtn.toFixed(2), isPass, hasLiet });
          };

          const resetFields = () => {
            setSelectedStudent(null); setSearchTerm(''); setExamScores(['', '', '', '']);
            setYear10(''); setYear11(''); setYear12(''); setBonusKK('0'); setBonusUT('0'); setResult(null);
          };

          return (
            <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-100 max-w-6xl mx-auto">
              <h2 className="text-2xl font-bold text-center text-blue-800 uppercase tracking-wide mb-6">Tính Điểm Xét Tốt Nghiệp THPT</h2>
              
              <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div className="lg:col-span-7 xl:col-span-8 space-y-6">
                  <div className="p-5 border border-gray-200 rounded-xl bg-gray-50/50">
                    <label className="block text-sm font-semibold text-blue-800 mb-2">Tìm kiếm học sinh (Dữ liệu tự động lấy từ Excel)</label>
                    <div className="relative">
                      <input type="text" value={searchTerm} onChange={(e) => {setSearchTerm(e.target.value); setShowDropdown(true);}} onFocus={() => setShowDropdown(true)} placeholder="Nhập tên hoặc SBD..." className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                      {showDropdown && searchResults.length > 0 && (
                        <div className="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                          {searchResults.map((s, idx) => (
                            <div key={idx} className="px-4 py-3 hover:bg-blue-50 cursor-pointer border-b border-gray-50" onClick={() => handleSelect(s)}>
                              <span className="font-semibold text-blue-700">{s['SBD']}</span> - <span className="font-medium text-gray-800">{s['Họ tên'] || s['Họ và tên'] || s['Tên']}</span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="p-5 border border-gray-200 rounded-xl bg-white shadow-sm">
                      <h3 className="font-semibold text-blue-800 mb-4 text-sm border-b pb-2">Điểm Các Môn Dự Thi</h3>
                      <div className="grid grid-cols-2 gap-4">
                        {[1, 2, 3, 4].map((num, i) => (
                          <div key={num}>
                            <label className="block text-xs font-medium text-gray-500 mb-1">Môn thi {num}</label>
                            <input type="number" step="0.01" min="0" max="10" value={examScores[i]} onChange={(e) => { const n = [...examScores]; n[i] = e.target.value; setExamScores(n); }} className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 bg-blue-50/30 outline-none" />
                          </div>
                        ))}
                      </div>
                    </div>
                    <div className="p-5 border border-gray-200 rounded-xl bg-white shadow-sm">
                      <h3 className="font-semibold text-blue-800 mb-4 text-sm border-b pb-2">Khuyến Khích & Ưu Tiên</h3>
                      <div className="space-y-4">
                        <div>
                          <label className="block text-xs font-medium text-gray-500 mb-1">Điểm Khuyến khích (KK)</label>
                          <input type="number" step="0.01" min="0" value={bonusKK} onChange={e => setBonusKK(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />
                        </div>
                        <div>
                          <label className="block text-xs font-medium text-gray-500 mb-1">Điểm Ưu tiên (UT)</label>
                          <input type="number" step="0.01" min="0" value={bonusUT} onChange={e => setBonusUT(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="p-5 border border-gray-200 rounded-xl bg-white shadow-sm">
                    <h3 className="font-semibold text-blue-800 mb-4 text-sm border-b pb-2">Điểm TB Học Tập Cả Năm</h3>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                      <div>
                        <label className="block text-xs font-medium text-gray-500 mb-1">Trung bình Lớp 10</label>
                        <input type="number" step="0.01" min="0" max="10" value={year10} onChange={e => setYear10(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-500 mb-1">Trung bình Lớp 11</label>
                        <input type="number" step="0.01" min="0" max="10" value={year11} onChange={e => setYear11(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      <div>
                        <label className="block text-xs font-medium text-gray-500 mb-1">Trung bình Lớp 12</label>
                        <input type="number" step="0.01" min="0" max="10" value={year12} onChange={e => setYear12(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                    </div>
                  </div>
                </div>

                <div className="lg:col-span-5 xl:col-span-4 flex flex-col gap-6">
                  <div className="flex flex-col sm:flex-row gap-4">
                    <button onClick={calculate} className="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition-colors">TÍNH KẾT QUẢ</button>
                    <button onClick={resetFields} className="flex-1 bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-4 rounded-xl shadow-sm transition-colors">RESET / XÓA</button>
                  </div>

                  {result ? (
                    <div className={`flex-1 p-6 flex flex-col justify-center items-center rounded-xl text-center border-2 shadow-sm animate-fade-in ${result.isPass ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`}>
                      <div className="text-lg font-medium mb-2">ĐIỂM XÉT TỐT NGHIỆP</div>
                      <div className="font-black text-6xl mb-6">{result.dxtn}</div>
                      {result.isPass ? (
                        <div className="font-bold text-lg px-4 py-2 bg-green-100 rounded-lg inline-block">✅ TRẠNG THÁI: ĐỦ ĐIỀU KIỆN ĐỖ</div>
                      ) : (
                        <>
                          <div className="font-bold text-lg mb-2 px-4 py-2 bg-red-100 rounded-lg inline-block">❌ CHƯA ĐỦ ĐIỀU KIỆN</div>
                          <div className="text-sm font-medium opacity-80 mt-2">Lý do: {result.hasLiet ? 'Có môn bị điểm liệt (≤ 1.0 điểm)' : 'ĐXTN dưới 5.0'}</div>
                        </>
                      )}
                    </div>
                  ) : (
                    <div className="flex-1 p-6 flex flex-col justify-center items-center rounded-xl text-center border-2 border-dashed border-gray-200 bg-gray-50/50 text-gray-400 min-h-[300px]">
                      <div className="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mb-4">
                        <IconGraduation />
                      </div>
                      <p className="text-sm font-medium">Nhập thông tin điểm số bên trái và nhấn<br/><b className="text-green-600 mt-1 inline-block uppercase">Tính Kết Quả</b><br/>để xem điểm tại đây.</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        };

        // ==========================================
        // MAIN APP COMPONENT (Tự động tải File)
        // ==========================================
        const App = () => {
          const [data, setData] = useState([]);
          const [loading, setLoading] = useState(false);
          const [error, setError] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          
          // Hàm tự động tải file data.xlsx
          const loadAutoFile = async () => {
            setLoading(true);
            setError(null);
            try {
              // Tên file Excel mặc định là data.xlsx cùng thư mục
              const response = await fetch('./data.xlsx');
              
              if (!response.ok) {
                throw new Error("Không tìm thấy file data.xlsx trong cùng thư mục.");
              }
              
              const arrayBuffer = await response.arrayBuffer();
              const wb = XLSX.read(arrayBuffer, { type: 'array' });
              const wsname = wb.SheetNames[0];
              const ws = wb.Sheets[wsname];
              const rawData = XLSX.utils.sheet_to_json(ws);
              
              setData(rawData);
            } catch (err) {
              setError("Lỗi tự động tải file: " + err.message + " --- Vui lòng chắc chắn bạn đã đặt tên file là data.xlsx và đã đẩy lên GitHub thành công.");
            }
            setLoading(false);
          };

          // Chạy tự động 1 lần khi mở trang
          useEffect(() => {
            loadAutoFile();
          }, []);
          
          return (
            <div className="flex h-screen bg-gray-50 font-sans">
               {/* SIDEBAR */}
               <aside className="w-64 bg-white border-r border-gray-200 flex flex-col shadow-sm z-10 hidden md:flex">
                  <div className="p-6 border-b border-gray-100"> 
                    <h1 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-purple-600">EduAnalytics</h1>
                  </div>
                  <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                     <NavItem icon={<IconDashboard/>} label="Tổng quan" active={activeTab==='dashboard'} onClick={()=>setActiveTab('dashboard')} disabled={data.length===0} />
                     <NavItem icon={<IconBook/>} label="Phân tích Môn học" active={activeTab==='subject'} onClick={()=>setActiveTab('subject')} disabled={data.length===0} />
                     <NavItem icon={<IconUsers/>} label="Phân tích Lớp" active={activeTab==='class'} onClick={()=>setActiveTab('class')} disabled={data.length===0} />
                     <NavItem icon={<IconSearch/>} label="Tra cứu Điểm" active={activeTab==='search'} onClick={()=>setActiveTab('search')} disabled={data.length===0} />
                     <NavItem icon={<IconGraduation/>} label="Tính điểm TN" active={activeTab==='graduation'} onClick={()=>setActiveTab('graduation')} disabled={data.length===0} />
                  </nav>
               </aside>
               
               {/* MAIN CONTENT */}
               <main className="flex-1 flex flex-col h-screen overflow-hidden">
                  <header className="bg-white border-b border-gray-200 p-4 px-6 flex justify-between items-center shadow-sm z-0">
                     <h2 className="text-xl font-bold text-gray-800">
                        {activeTab === 'dashboard' && 'Bảng Tổng Quan Dữ Liệu'}
                        {activeTab === 'subject' && 'Phân Tích Chi Tiết Môn Học'}
                        {activeTab === 'class' && 'Phân Tích Thống Kê Theo Lớp'}
                        {activeTab === 'search' && 'Tra Cứu Kết Quả Học Sinh'}
                        {activeTab === 'graduation' && 'Hệ Thống Tính Điểm Xét Tốt Nghiệp'}
                     </h2>
                  </header>
                  
                  <div className="flex-1 overflow-auto p-6 bg-slate-50/50">
                     {loading && (
                        <div className="flex justify-center items-center h-full">
                           <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                     )}
                     
                     {!loading && error && (
                        <div className="p-6 bg-red-50 text-red-700 border border-red-200 rounded-xl font-medium text-center max-w-3xl mx-auto mt-10">
                          <div className="font-bold text-xl mb-4">LỖI TẢI FILE TỰ ĐỘNG</div>
                          <p>{error}</p>
                          <br/>
                          <p className="text-sm font-normal"><b>Gợi ý khắc phục:</b> Đảm bảo bạn đã tải file Excel tên là <b>data.xlsx</b> lên kho lưu trữ GitHub cùng với file index.html này.</p>
                        </div>
                     )}

                     {!loading && data.length > 0 && !error && (
                        <div className="animate-fade-in h-full">
                          {activeTab === 'dashboard' && <DashboardView data={data} />}
                          {activeTab === 'subject' && <SubjectAnalysisView data={data} />}
                          {activeTab === 'class' && <ClassAnalysisView data={data} />}
                          {activeTab === 'search' && <SearchView data={data} />}
                          {activeTab === 'graduation' && <GraduationView data={data} />}
                        </div>
                     )}
                  </div>
               </main>
            </div>
          )
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
